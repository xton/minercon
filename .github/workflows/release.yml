name: Release

# Publishes minercon to npm with build provenance and creates a GitHub Release
# with the server-side plugin/mod jars attached. Triggered by pushing a version
# tag, e.g.:
#
#   git tag v3.0.0 && git push origin v3.0.0
#
# Publishing uses npm "trusted publishing" (OIDC) — no NPM_TOKEN secret. npm is
# configured (Package -> Settings -> Publishing access) to trust this repo's
# `release.yml` workflow, and the `id-token: write` permission below lets the
# job mint the short-lived OIDC token npm verifies. Provenance is attached
# automatically under trusted publishing.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release and upload assets
  id-token: write   # OIDC token for npm trusted publishing + provenance

jobs:
  release:
    name: Publish and release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Upgrade npm (trusted publishing needs >= 11.5.1)
        run: npm install -g npm@latest

      - name: Set up Java (for plugin/mod build)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - name: Unit tests
        run: xvfb-run -a npm test

      - name: Build paper-plugin
        run: cd paper-plugin && ./gradlew build
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Build spigot-plugin
        run: cd spigot-plugin && ./gradlew build
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Build fabric mod
        run: cd fabric-mod && ./gradlew build
        env:
          GRADLE_OPTS: -Dorg.gradle.daemon=false

      - name: Publish to npm (trusted publishing + provenance)
        run: npm publish --provenance --access public

      - name: Collect release artifacts
        run: |
          mkdir -p dist-artifacts
          # The installable jars only — exclude loom/paperweight -dev and
          # -sources jars that also land in build/libs.
          find paper-plugin/build/libs spigot-plugin/build/libs fabric-mod/build/libs \
            -name '*-tabcomplete-*.jar' ! -name '*-sources.jar' ! -name '*-dev.jar' \
            -exec cp -v {} dist-artifacts/ \;
          # The exact tarball that was published to npm, for non-npm users.
          npm pack --pack-destination dist-artifacts
          ls -la dist-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-artifacts/*
          generate_release_notes: true
          fail_on_unmatched_files: true
