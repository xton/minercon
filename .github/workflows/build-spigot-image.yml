name: Build Spigot pre-built image

on:
  push:
    branches: [main]
    paths:
      - docker/Dockerfile.spigot
  workflow_dispatch:
    inputs:
      mc_version:
        description: Minecraft version to build
        default: '1.21.4'
        required: true

env:
  MC_VERSION: ${{ inputs.mc_version || '1.21.4' }}

jobs:
  build:
    name: Build spigot-prebuilt:${{ inputs.mc_version || '1.21.4' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: docker
          file: docker/Dockerfile.spigot
          build-args: MC_VERSION=${{ env.MC_VERSION }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/minercon/spigot-prebuilt:${{ env.MC_VERSION }}
          # Layer cache is stored in GHCR — BuildTools compile is cached across runs.
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/minercon/spigot-prebuilt:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/minercon/spigot-prebuilt:cache,mode=max
