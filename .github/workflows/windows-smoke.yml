name: Windows Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  MC_VERSION: '1.21.4'

jobs:
  windows-smoke:
    name: Windows smoke test
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile (cross-platform check)
        run: npm run compile

      - name: CLI --version
        run: node out/minercon --version

      - name: CLI --help
        run: node out/minercon --help

      - name: Non-TTY rejection
        shell: bash
        run: |
          output=$(echo "" | node out/minercon 2>&1 || true)
          echo "$output"
          echo "$output" | grep -q "does not support piped input"

      - name: Unit tests
        run: npm test

      - name: Switch Docker to Linux containers
        # windows-latest defaults to Windows containers mode; Minecraft server
        # images are Linux, so we need to switch. Takes ~30-60 s.
        shell: powershell
        run: |
          & "C:\Program Files\Docker\Docker\DockerCli.exe" -SwitchLinuxEngine
          $elapsed = 0
          do {
            Start-Sleep -Seconds 2
            $elapsed += 2
            $info = docker info 2>&1
          } while ($LASTEXITCODE -ne 0 -and $elapsed -lt 90)
          if ($LASTEXITCODE -ne 0) { throw "Docker Linux engine did not become ready" }
          docker version

      - name: Vanilla connection test
        run: npx mocha --ui tdd --timeout 360000 --grep "\[vanilla\]" out/test/functional/connection.test.js
